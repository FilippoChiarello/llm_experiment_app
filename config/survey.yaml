sections:
  - id: "experience"
    title: "User Experience"
    description: "Please evaluate your interaction with the system."
    questions:
      - id: "clarity"
        type: "likert"
        text: "Were the system responses clear?"
        options:
          - value: "1"
            label: "Not at all"
          - value: "2"
            label: "A little"
          - value: "3"
            label: "Moderately"
          - value: "4"
            label: "Quite a lot"
          - value: "5"
            label: "Very much"
      - id: "trust"
        type: "likert"
        text: "How much did you trust the responses?"
        options:
          - value: "1"
            label: "Not at all"
          - value: "2"
            label: "A little"
          - value: "3"
            label: "Moderately"
          - value: "4"
            label: "Quite a lot"
          - value: "5"
            label: "Very much"
  - id: "feedback"
    title: "Final Comment"
    questions:
      - id: "free_comment"
        type: "open_text"
        text: "If you wish, please leave any final comment about the experience."
